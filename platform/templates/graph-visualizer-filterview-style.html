<style>
/* ── filter bar ── */
#filter-bar *, #filter-bar *::before, #filter-bar *::after { box-sizing: border-box; margin: 0; }

#filter-bar {
  --bg:       #ffffff;
  --border:   #e0d0b0;
  --accent:   #e8720c;
  --accent2:  #c95a00;
  --text:     #2a1f0a;
  --text-dim: #8a6a3a;
  --hover-bg: #fdf3e6;
  --radius:   6px;
  --font:     'JetBrains Mono', 'Fira Code', monospace;

  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-family: var(--font), serif;
  font-size: 12px;
  pointer-events: none;
}

#filter-bar > * {
  pointer-events: auto;
}

#filter-bar .fb-input-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
  box-shadow: 0 2px 10px rgba(0,0,0,.12);
}

#filter-bar .fb-control-group {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

#filter-bar .fb-search-group {
  padding-left: 8px;
  margin-left: 2px;
  border-left: 1px solid var(--border);
}

#filter-bar .fb-input-row input {
  width: 220px;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--font), serif;
  font-size: 12px;
  color: var(--text);
  padding: 6px 8px;
}

#filter-bar #fb-search-input {
  width: 180px;
}

#filter-bar #fb-reset {
  margin-left: 6px;
}

#filter-bar .fb-input-row input::placeholder {
  color: var(--text-dim);
  opacity: .7;
}

#filter-bar .fb-btn {
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font), serif;
  font-size: 11px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
}
#filter-bar .fb-btn:hover {
  background: var(--hover-bg);
  border-color: var(--accent);
}
#filter-bar .fb-btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent2);
}
#filter-bar .fb-btn-primary:hover {
  background: var(--accent2);
}

#filter-bar .fb-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
}

#filter-bar .fb-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--hover-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 8px 2px 10px;
  font-size: 11px;
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
</style>
