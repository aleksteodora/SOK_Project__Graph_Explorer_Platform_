<script>
(function () {
  'use strict';

  const container = document.getElementById('tree-view-content');
  let selectedId  = null;
  let nodeMap     = {};
  let treeChildren = {};
  let treeRootIds = [];
  let mountVersion = 0;

  const CHEVRON = '<svg viewBox="0 0 10 10"><path d="M3 1l4 4-4 4"/></svg>';
  const INTERNAL_ATTR_KEYS = new Set([
    'id',
    'index', 'x', 'y', 'vx', 'vy', 'fx', 'fy',
    '_hw', '_hh', '_dragOffsetX', '_dragOffsetY',
  ]);
  const ATTRIBUTE_INDENT_OFFSET = 39;

  function getGraphApiUrl() {
    const path = (window.location && window.location.pathname) || '';
    if (path.indexOf('/graph_visualizer') === 0) {
      return '/graph_visualizer/api/graph/';
    }
    return '/api/graph/';
  }

  function normalizeApiNodes(payloadNodes) {
    if (!Array.isArray(payloadNodes)) return [];
    return payloadNodes.map(n => {
      const attrs = (n && n.attributes && typeof n.attributes === 'object') ? n.attributes : {};
      const out = Object.assign({ id: n.node_id }, attrs);
      if (out.label == null && out.name != null) out.label = out.name;
      return out;
    }).filter(n => n.id != null);
  }

  function normalizeApiLinks(payloadEdges) {
    if (!Array.isArray(payloadEdges)) return [];
    return payloadEdges
      .map(e => {
        const attrs = (e && e.attributes && typeof e.attributes === 'object') ? e.attributes : {};
        return Object.assign({
          source: e.source_id,
          target: e.target_id,
        }, attrs);
      })
      .filter(l => l.source != null && l.target != null);
  }

  function mergeNodes(baseNodes, apiNodes) {
    const mergedById = {};
    baseNodes.forEach(n => {
      if (!n || n.id == null) return;
      mergedById[n.id] = Object.assign({}, n);
    });
    apiNodes.forEach(n => {
      const prev = mergedById[n.id] || {};
      mergedById[n.id] = Object.assign({}, prev, n);
    });
    return Object.keys(mergedById).map(id => mergedById[id]);
  }

  function enrichTreeData(baseNodes, baseLinks) {
    return fetch(getGraphApiUrl(), { credentials: 'same-origin' })
      .then(r => {
        if (!r.ok) throw new Error('Graph API request failed');
        return r.json();
      })
      .then(data => {
        const apiNodes = normalizeApiNodes(data.nodes);
        const apiLinks = normalizeApiLinks(data.edges);
        return {
          nodes: apiNodes.length ? mergeNodes(baseNodes, apiNodes) : baseNodes,
          links: apiLinks.length ? apiLinks : baseLinks,
        };
      })
      .catch(() => ({ nodes: baseNodes, links: baseLinks }));
  }

  function buildTree(nodes, links) {
    const byId = {};
    const children = {};
    const parents = {};
    const outgoing = {};
    const hasParent = new Set();

    nodes.forEach(n => {
      if (!n || n.id == null) return;
      byId[n.id] = n;
      children[n.id] = [];
      parents[n.id] = [];
      outgoing[n.id] = [];
    });

    links.forEach(l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (!Object.prototype.hasOwnProperty.call(byId, sid) || !Object.prototype.hasOwnProperty.call(byId, tid)) {
        return;
      }
      if (outgoing[sid].indexOf(tid) === -1) {
        outgoing[sid].push(tid);
      }
      if (parents[tid].indexOf(sid) === -1) {
        parents[tid].push(sid);
      }
      hasParent.add(tid);
    });

    Object.keys(outgoing).forEach((id) => {
      children[id] = outgoing[id].slice();
    });

    const roots = [];
    const visited = new Set();

    function addComponentRoot(startId) {
      if (!Object.prototype.hasOwnProperty.call(byId, startId) || visited.has(startId)) {
        return;
      }

      roots.push(byId[startId]);
      visited.add(startId);

      const stack = [startId];
      while (stack.length) {
        const currentId = stack.pop();
        const nextIds = outgoing[currentId] || [];

        nextIds.forEach((childId) => {
          if (visited.has(childId)) return;
          visited.add(childId);
          stack.push(childId);
        });
      }
    }

    const candidateRoots = nodes
      .filter(n => n && n.id != null && !hasParent.has(n.id))
      .map(n => n.id);
    candidateRoots.forEach(addComponentRoot);

    // Ensure every disconnected or fully cyclic component gets represented.
    nodes.forEach((n) => {
      if (!n || n.id == null) return;
      addComponentRoot(n.id);
    });

    return { byId, children, parents, roots };
  }

  function idsEqual(a, b) {
    return String(a) === String(b);
  }

  function findAnyRowById(id) {
    const rows = container.querySelectorAll('.tv-item[data-id]');
    for (const row of rows) {
      if (idsEqual(row.dataset.id, id)) return row;
    }
    return null;
  }

  function findDirectRowById(scope, id) {
    if (!scope || !scope.children) return null;
    const kids = Array.from(scope.children);
    for (const child of kids) {
      if (!child.classList || !child.classList.contains('tv-item')) continue;
      if (idsEqual(child.dataset.id, id)) return child;
    }
    return null;
  }

  function findPathFromRoots(targetId) {
    const target = String(targetId);
    if (!target.length) return null;

    const roots = treeRootIds.length ? treeRootIds.slice() : Object.keys(nodeMap);
    const queue = roots.map(rootId => [rootId]);
    const visited = new Set();

    while (queue.length) {
      const path = queue.shift();
      const currentId = path[path.length - 1];
      const key = String(currentId);
      if (visited.has(key)) continue;
      visited.add(key);

      if (key === target) return path;

      const children = treeChildren[currentId] || [];
      children.forEach((childId) => {
        const childKey = String(childId);
        if (!visited.has(childKey)) {
          queue.push(path.concat(childId));
        }
      });
    }

    return null;
  }

  function ensureRowVisible(id) {
    let row = findAnyRowById(id);
    if (row) return row;

    const path = findPathFromRoots(id);
    if (!path || !path.length) return null;

    let scope = container;
    for (let i = 0; i < path.length; i += 1) {
      row = findDirectRowById(scope, path[i]);
      if (!row) return null;

      const childBox = row.nextElementSibling;
      if (childBox && childBox.classList.contains('tv-children')) {
        if (typeof childBox.__renderChildrenOnce === 'function') {
          childBox.__renderChildrenOnce();
        }
        if (i < path.length - 1) {
          childBox.classList.add('tv-open');
          const tog = row.querySelector('.tv-toggle');
          if (tog) tog.classList.add('tv-expanded');
          scope = childBox;
        }
      }
    }

    return row;
  }

  function getAttributeEntries(node) {
    return Object.entries(node).filter(([key, value]) => {
      if (INTERNAL_ATTR_KEYS.has(key)) return false;
      if (value == null) return false;
      const type = typeof value;
      return type === 'string' || type === 'number' || type === 'boolean';
    });
  }

  function renderAttributes(node, depth) {
    const attrs = getAttributeEntries(node);
    if (!attrs.length) return null;

    const attrsBox = document.createElement('div');
    attrsBox.className = 'tv-attrs';
    attrsBox.style.paddingLeft = (depth * 16 + ATTRIBUTE_INDENT_OFFSET) + 'px';

    attrs.forEach(([key, value]) => {
      const attrRow = document.createElement('div');
      attrRow.className = 'tv-attr-row';

      const keyEl = document.createElement('span');
      keyEl.className = 'tv-attr-key';
      keyEl.textContent = key + ':';
      attrRow.appendChild(keyEl);

      const valueEl = document.createElement('span');
      valueEl.className = 'tv-attr-value';
      valueEl.textContent = String(value);
      attrRow.appendChild(valueEl);

      attrsBox.appendChild(attrRow);
    });

    return attrsBox;
  }

  function renderNode(node, childrenMap, depth) {
    const kids    = childrenMap[node.id] || [];
    const hasChildren = kids.length > 0;
    const attrsBox = renderAttributes(node, depth);
    const isLeaf  = !hasChildren && !attrsBox;
    const indent  = depth * 16;

    /* row */
    const row = document.createElement('div');
    row.className = 'tv-item';
    row.dataset.id = node.id;
    row.style.paddingLeft = indent + 'px';

    /* chevron */
    const toggle = document.createElement('span');
    toggle.className = 'tv-toggle' + (isLeaf ? ' tv-leaf' : '');
    toggle.innerHTML = CHEVRON;
    row.appendChild(toggle);

    /* icon */
    const icon = document.createElement('span');
    icon.className = 'tv-icon';
    const dot = document.createElement('span');
    dot.className = 'tv-icon-dot';
    icon.appendChild(dot);
    row.appendChild(icon);

    /* label */
    const label = document.createElement('span');
    label.className = 'tv-label';
    label.textContent = 'ID: ' + (node.id != null ? String(node.id) : '');
    row.appendChild(label);

    const frag = document.createDocumentFragment();
    frag.appendChild(row);

    /* children container */
    let childBox = null;
    if (!isLeaf) {
      childBox = document.createElement('div');
      childBox.className = 'tv-children';

      if (attrsBox) {
        childBox.appendChild(attrsBox);
      }

      const renderChildrenOnce = () => {
        if (childBox.dataset.childrenRendered === '1') return;
        childBox.dataset.childrenRendered = '1';
        kids.forEach(cid => {
          const childNode = nodeMap[cid];
          if (!childNode) return;
          childBox.appendChild(renderNode(childNode, childrenMap, depth + 1));
        });
      };
      childBox.__renderChildrenOnce = renderChildrenOnce;

      frag.appendChild(childBox);
    }

    /* toggle expand/collapse */
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!childBox) return;
      if (!childBox.classList.contains('tv-open') && typeof childBox.__renderChildrenOnce === 'function') {
        childBox.__renderChildrenOnce();
      }
      const open = childBox.classList.toggle('tv-open');
      toggle.classList.toggle('tv-expanded', open);
    });

    /* select on row click */
    row.addEventListener('click', () => {
      const isSameSelected = selectedId === node.id;
      const isAttrsOpen = row.classList.contains('tv-attrs-open');
      if (isSameSelected && isAttrsOpen) {
        row.classList.remove('tv-attrs-open');
        if (childBox) {
          const hasChildRows = Array.from(childBox.children)
            .some(el => el.classList && el.classList.contains('tv-item'));
          if (!hasChildRows) {
            childBox.classList.remove('tv-open');
            toggle.classList.remove('tv-expanded');
          }
        }
        return;
      }

      selectInTree(node.id);
      if (childBox) {
        if (typeof childBox.__renderChildrenOnce === 'function') {
          childBox.__renderChildrenOnce();
        }
        childBox.classList.add('tv-open');
        toggle.classList.add('tv-expanded');
        row.classList.add('tv-attrs-open');
      }
      /* notify main view and center on selected node */
      const gv = window.GraphVisualizer;
      if (gv && gv.select) gv.select(node.id, { center: true });
    });

    return frag;
  }

  function selectInTree(id) {
    selectedId = id;

    container.querySelectorAll('.tv-item.tv-selected')
      .forEach(el => el.classList.remove('tv-selected'));

    if (id == null) return;

    let row = findAnyRowById(id);
    if (!row) row = ensureRowVisible(id);
    if (!row) return;

    row.classList.add('tv-selected');

    const childBox = row.nextElementSibling;
    if (childBox && childBox.classList.contains('tv-children')) {
      if (typeof childBox.__renderChildrenOnce === 'function') {
        childBox.__renderChildrenOnce();
      }
      childBox.classList.add('tv-open');
      row.classList.add('tv-attrs-open');
      const rowToggle = row.querySelector('.tv-toggle');
      if (rowToggle) rowToggle.classList.add('tv-expanded');
    }

    /* auto-expand parents */
    let parent = row.parentElement;
    while (parent && parent !== container) {
      if (parent.classList.contains('tv-children')) {
        parent.classList.add('tv-open');
        const prev = parent.previousElementSibling;
        if (prev && prev.classList.contains('tv-item')) {
          const tog = prev.querySelector('.tv-toggle');
          if (tog) tog.classList.add('tv-expanded');
        }
      }
      parent = parent.parentElement;
    }

    /* scroll into view */
    row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  /* listen for main-view selection */
  const mainView = document.getElementById('main-view');
  if (mainView) {
    mainView.addEventListener('gv:select', (e) => {
      selectInTree(e.detail.id);
    });
  }

  /* public API */
  window.GraphTreeView = {
    mount(nodes, links) {
      mountVersion += 1;
      const currentMount = mountVersion;
      const baseNodes = Array.isArray(nodes) ? nodes : [];
      const baseLinks = Array.isArray(links) ? links : [];

      enrichTreeData(baseNodes, baseLinks).then(({ nodes: resolvedNodes, links: resolvedLinks }) => {
        if (currentMount !== mountVersion) return;

      container.innerHTML = '';
      selectedId = null;

      nodeMap = {};
      resolvedNodes.forEach(n => { nodeMap[n.id] = n; });

      const tree = buildTree(resolvedNodes, resolvedLinks);
      treeChildren = tree.children;
      treeRootIds = tree.roots.map(root => root.id);

      tree.roots.forEach(root => {
        container.appendChild(renderNode(root, tree.children, 0));
      });

      /* auto-expand first level */
      container.querySelectorAll('#tree-view-content > .tv-children').forEach(ch => {
        if (typeof ch.__renderChildrenOnce === 'function') {
          ch.__renderChildrenOnce();
        }
        const hasChildRows = Array.from(ch.children)
          .some(el => el.classList && el.classList.contains('tv-item'));
        if (!hasChildRows) return;
        ch.classList.add('tv-open');
        const prev = ch.previousElementSibling;
        if (prev) {
          const tog = prev.querySelector('.tv-toggle');
          if (tog) tog.classList.add('tv-expanded');
        }
      });
      });
    },

    select(id) { selectInTree(id); },
    refresh(nodes, links) { this.mount(nodes, links); },
  };

})();
</script>
