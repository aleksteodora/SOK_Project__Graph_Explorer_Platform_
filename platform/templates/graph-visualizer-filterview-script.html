<script>
(function () {
  'use strict';

  const input    = document.getElementById('fb-input');
  const applyBtn = document.getElementById('fb-apply');
  const resetBtn = document.getElementById('fb-reset');
  const searchInput = document.getElementById('fb-search-input');
  const searchBtn = document.getElementById('fb-search');
  const chipsBox = document.getElementById('fb-chips');
  const mainView = document.getElementById('main-view');

  const queries = []; // ordered: [{ type: 'filter'|'search', ... }]
  let operationChain = Promise.resolve();

  function resolveApiUrl(relativePath, overrideKey) {
    const override = window[overrideKey];
    if (typeof override === 'string' && override.trim()) {
      return override;
    }
    return relativePath;
  }

  const POST_MESSAGE_URL = resolveApiUrl('api/message/', '__GV_MESSAGE_API_URL');
  const POST_QUERIES_RESET_URL = resolveApiUrl('api/queries/reset/', '__GV_QUERIES_RESET_API_URL');

  function parseExpression(raw) {
    const parts = raw.trim().split(/\s+/);
    if (parts.length < 3) return null;
    return {
      attribute: parts[0],
      operand:   parts[1],
      value:     parts.slice(2).join(' '),
    };
  }

  function getFilters() {
    const out = [];
    let level = 0;
    queries.forEach((entry) => {
      if (entry.type !== 'filter') return;
      out.push({
        raw: entry.raw,
        attribute: entry.attribute,
        operand: entry.operand,
        value: entry.value,
        level,
      });
      level += 1;
    });
    return out;
  }

  function getSearches() {
    return queries
      .filter((entry) => entry.type === 'search')
      .map((entry) => entry.term);
  }

  function getSearch() {
    const searches = getSearches();
    return searches.length ? searches[searches.length - 1] : '';
  }

  function getLevel() {
    return getFilters().length;
  }

  function buildState() {
    const filters = getFilters();
    const searches = getSearches();
    const level = filters.length;
    const term = searches.length ? searches[searches.length - 1] : '';
    return {
      filters,
      searches,
      level,
      term,
      query: term,
    };
  }

  function dispatchMainEvent(name, detail) {
    if (!mainView) return;
    mainView.dispatchEvent(new CustomEvent(name, {
      detail,
      bubbles: true,
    }));
  }

  function callHook(hookName, ...args) {
    const api = window.GraphFilterBar;
    const hook = api && api[hookName];
    if (typeof hook === 'function') {
      try {
        hook(...args);
      } catch (e) {
        return;
      }
    }
  }

  function reportError(error) {
    const msg = (error && error.message) ? error.message : String(error || 'Unknown error');
    dispatchMainEvent('gv:query-error', Object.assign({ error: msg }, buildState()));
    callHook('onError', msg);
  }

  function executeGraphHtml(graphHtml) {
    if (!graphHtml || typeof graphHtml !== 'string') return;

    const tmp = document.createElement('div');
    tmp.innerHTML = graphHtml;
    const scripts = tmp.querySelectorAll('script');
    scripts.forEach((srcScript) => {
      const newScript = document.createElement('script');
      newScript.textContent = srcScript.textContent;
      document.body.appendChild(newScript);
      newScript.remove()
    });
  }

  function postJson(url, payload) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload || {}),
    }).then((r) => r.json());
  }

  function runCliCommand(command) {
    return postJson(POST_MESSAGE_URL, {
      message: command,
      silent: true,
    }).then((data) => {
      if (data.error) throw new Error(data.error);
      executeGraphHtml(data.graph_html);
      return data;
    });
  }

  function resetServerQueries() {
    return postJson(POST_QUERIES_RESET_URL, {
      silent: true,
    }).then((data) => {
      if (data.error) throw new Error(data.error);
      executeGraphHtml(data.graph_html);
      return data;
    });
  }

  function queueOperation(operation) {
    operationChain = operationChain
      .then(() => operation())
      .catch((error) => {
        reportError(error);
      });
    return operationChain;
  }

  function renderChips() {
    chipsBox.innerHTML = '';

    queries.forEach((entry) => {
      const chip = document.createElement('span');
      chip.className = 'fb-chip';

      const text = entry.type === 'filter'
        ? (entry.attribute + ' ' + entry.operand + ' ' + entry.value)
        : ('search: ' + entry.term);

      const txt = document.createTextNode(text);
      chip.appendChild(txt);

      chipsBox.appendChild(chip);
    });
  }

  function addFilterRaw(raw) {
    const parsed = parseExpression(raw);
    if (!parsed) {
      throw new Error("Filter must follow format: '<attribute> <comparator> <value>'.");
    }

    const entry = {
      type: 'filter',
      raw,
      attribute: parsed.attribute,
      operand:   parsed.operand,
      value:     parsed.value,
    };
    queries.push(entry);
    renderChips();

    return runCliCommand('filter ' + raw)
      .then(() => {
        const state = buildState();
        const filter = {
          raw: entry.raw,
          attribute: entry.attribute,
          operand: entry.operand,
          value: entry.value,
          level: state.level - 1,
        };
        dispatchMainEvent('gv:filter-add', Object.assign({ filter }, state));
        callHook('onAdd', filter, state.filters.slice(), state.level);
      })
      .catch((error) => {
        queries.pop();
        renderChips();
        throw error;
      });
  }

  function addSearchRaw(raw) {
    const term = String(raw || '').trim();
    if (!term) return Promise.resolve();

    const entry = {
      type: 'search',
      raw: term,
      term,
    };
    queries.push(entry);
    renderChips();

    return runCliCommand('search ' + term)
      .then(() => {
        const state = buildState();
        dispatchMainEvent('gv:search', Object.assign({ term, query: term }, state));
        callHook('onSearch', term, state.searches.slice(), state.level);
      })
      .catch((error) => {
        queries.pop();
        renderChips();
        throw error;
      });
  }

  function resetAll() {
    const previousQueries = queries.slice();
    const removedFilters = getFilters();
    const removedSearches = getSearches();

    queries.splice(0, queries.length);
    if (input) input.value = '';
    if (searchInput) searchInput.value = '';
    renderChips();

    return resetServerQueries()
      .then(() => {
        const state = buildState();
        dispatchMainEvent('gv:filter-reset', Object.assign({
          removed: removedFilters,
        }, state));
        dispatchMainEvent('gv:search-reset', Object.assign({
          removed: removedSearches,
          term: '',
          query: '',
        }, state));
        callHook('onReset');
        callHook('onSearchReset');
      })
      .catch((error) => {
        queries.splice(0, queries.length, ...previousQueries);
        renderChips();
        throw error;
      });
  }

  function onApplyClick() {
    const raw = (input ? input.value : '').trim();
    if (!raw) return;
    if (input) input.value = '';
    queueOperation(() => addFilterRaw(raw));
  }

  function onSearchClick() {
    const raw = (searchInput ? searchInput.value : '').trim();
    if (!raw) return;
    if (searchInput) searchInput.value = '';
    queueOperation(() => addSearchRaw(raw));
  }

  if (applyBtn) applyBtn.addEventListener('click', onApplyClick);
  if (searchBtn) searchBtn.addEventListener('click', onSearchClick);
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      queueOperation(() => resetAll());
    });
  }

  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        onApplyClick();
      }
      if (e.key === 'Escape') {
        input.value = '';
        input.blur();
      }
    });
  }

  if (searchInput) {
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        onSearchClick();
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        searchInput.value = '';
        searchInput.blur();
      }
    });
  }

  window.GraphFilterBar = {
    getFilters()  { return getFilters(); },
    getLevel()    { return getLevel(); },
    getSearch()   { return getSearch(); },
    getSearches() { return getSearches(); },
    add(raw) {
      const value = String(raw || '').trim();
      if (!value) return;
      queueOperation(() => addFilterRaw(value));
    },
    reset() {
      queueOperation(() => resetAll());
    },
    search(raw) {
      const value = String(raw || '').trim();
      if (!value) return;
      queueOperation(() => addSearchRaw(value));
    },

    onAdd:    null,   // callback(entry, allFilters, level)
    onReset:  null,   // callback()
    onSearch: null,   // callback(term)
    onSearchReset: null, // callback()
    onError: null,
  };

})();
</script>
