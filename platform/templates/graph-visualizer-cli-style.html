<style>
#cli-terminal *, #cli-terminal *::before, #cli-terminal *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

#cli-terminal {
  --bg:       #ffffff;
  --border:   #e0d0b0;
  --accent:   #e8720c;
  --accent2:  #c95a00;
  --text:     #2a1f0a;
  --text-dim: #8a6a3a;
  --error:    #c0392b;
  --radius:   6px;
  --font:     'JetBrains Mono', 'Fira Code', monospace;

  display: none;
  font-family: var(--font);
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  min-width: 400px;
  overflow: hidden;
}

/* --- Log --- */
#cli-terminal .cli-log {
  padding: 12px 14px;
  min-height: 200px;
  max-height: 400px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: #fff8ee;
  border-bottom: 1px solid var(--border);
}

#cli-terminal .cli-log::-webkit-scrollbar {
  width: 4px;
}

#cli-terminal .cli-log::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

#cli-terminal .cli-entry {
  display: flex;
  gap: 8px;
  line-height: 1.5;
}

#cli-terminal .cli-entry .cli-ts {
  color: var(--text-dim);
  font-size: 10px;
  white-space: nowrap;
  padding-top: 2px;
  opacity: .6;
}

#cli-terminal .cli-entry .cli-msg {
  color: var(--text);
  word-break: break-all;
}

#cli-terminal .cli-entry.cli-out .cli-msg {
  color: var(--text-dim);
}

#cli-terminal .cli-entry.cli-err .cli-msg {
  color: var(--error);
}

#cli-terminal .cli-entry.cli-cmd .cli-msg::before {
  content: '> ';
  color: var(--accent);
}

/* --- Input row --- */
#cli-terminal .cli-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg);
}

#cli-terminal .cli-prompt {
  color: var(--accent);
  font-size: 14px;
  font-weight: bold;
  user-select: none;
}

#cli-terminal #cli-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 4px 0;
  outline: none;
  transition: border-color 0.15s;
}

#cli-terminal #cli-input:focus {
  border-bottom-color: var(--accent);
}

#cli-terminal #cli-input::placeholder {
  color: var(--text-dim);
  opacity: .5;
}

#cli-terminal #cli-send {
  background: var(--accent);
  border: 1px solid var(--accent2);
  border-radius: var(--radius);
  color: #ffffff;
  font-family: var(--font);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 5px 10px;
  cursor: pointer;
  transition: background 0.15s, filter 0.15s;
  filter: drop-shadow(0 2px 6px rgba(232,114,12,.3));
  white-space: nowrap;
}

#cli-terminal #cli-send:hover {
  background: var(--accent2);
  filter: drop-shadow(0 2px 10px rgba(232,114,12,.5));
}

#cli-open-btn {
  background: #e8720c;
  border: 1px solid #c95a00;
  border-radius: 6px;
  color: #ffffff;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 14px;
  cursor: pointer;
  filter: drop-shadow(0 2px 6px rgba(232,114,12,.3));
  transition: background 0.15s, filter 0.15s;
}

#cli-open-btn:hover {
  background: #c95a00;
  filter: drop-shadow(0 2px 10px rgba(232,114,12,.5));
}
</style>
