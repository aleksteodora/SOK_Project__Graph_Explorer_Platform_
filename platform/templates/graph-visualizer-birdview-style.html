<style>
#bird-view *, #bird-view *::before, #bird-view *::after { box-sizing: border-box; margin: 0; padding: 0; }

#bird-view {
  --bg:       #ffffff;
  --border:   #e0d0b0;
  --accent:   #e8720c;
  --accent2:  #c95a00;
  --text:     #2a1f0a;
  --radius:   6px;

  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  user-select: none;
  cursor: grab;
}

#bird-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: inherit;
}

.bv-world-border {
  fill: none;
  stroke: #d0bfa0;
  stroke-dasharray: 6 4;
  vector-effect: non-scaling-stroke;
  stroke-width: 1;
  pointer-events: none;
}

.bv-link {
  stroke: #c0a070;
  stroke-opacity: 0.6;
  vector-effect: non-scaling-stroke;
  stroke-width: 1;
  pointer-events: none;
}

.bv-node {
  fill: #e8720c;
  stroke: #c95a00;
  vector-effect: non-scaling-stroke;
  stroke-width: 1;
  pointer-events: none;
  transition: fill .15s;
}
@keyframes bv-pulse {
  0%,100% { filter: drop-shadow(0 0 3px #e8720c) drop-shadow(0 0 6px #e8720c); }
  50%     { filter: drop-shadow(0 0 8px #e8720c) drop-shadow(0 0 16px rgba(232,114,12,.6)); }
}

.bv-node.bv-selected {
  fill: #ffffff;
  stroke: #e8720c;
  stroke-width: 2.5;
  animation: bv-pulse 1.2s ease-in-out infinite;
}

.bv-viewport {
  fill: rgba(232, 114, 12, 0.08);
  stroke: var(--accent);
  vector-effect: non-scaling-stroke;
  stroke-width: 2;
  stroke-dasharray: 6 3;
  pointer-events: none;
}
</style>
