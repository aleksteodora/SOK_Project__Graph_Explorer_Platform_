<style>
#main-view *, #main-view *::before, #main-view *::after { box-sizing: border-box; margin: 0; padding: 0; }

#main-view {
  --bg:       #ffffff;
  --border:   #e0d0b0;
  --accent:   #e8720c;
  --accent2:  #c95a00;
  --text:     #2a1f0a;
  --text-dim: #8a6a3a;
  --radius:   6px;
  --font:     'JetBrains Mono', 'Fira Code', monospace;

  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--bg);
  font-family: var(--font), serif;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  user-select: none;
}

#canvas {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: #ffffff;
  cursor: grab;
}
#canvas.gv-panning { cursor: grabbing; }

#canvas::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, #d0bfa0 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  opacity: .6;
}

#canvas > svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: visible;
}

/* circle node fallback */
#canvas circle.node, #canvas .gv-node {
  fill: var(--accent) !important;
  stroke: var(--accent2) !important;
  stroke-width: 2 !important;
  cursor: grab;
  filter: drop-shadow(0 2px 6px rgba(232,114,12,.3));
  transition: fill .15s, filter .15s;
}
#canvas g.node circle {
  fill: var(--accent) !important;
  stroke: var(--accent2) !important;
  stroke-width: 2 !important;
  cursor: grab;
  filter: drop-shadow(0 2px 6px rgba(232,114,12,.3));
  transition: fill .15s, filter .15s, stroke .15s;
}
#canvas circle.node:hover, #canvas .gv-node:hover {
  fill: #f0962e !important;
  filter: drop-shadow(0 2px 10px rgba(232,114,12,.5));
}
#canvas g.node:hover circle {
  fill: #f0962e !important;
  filter: drop-shadow(0 2px 10px rgba(232,114,12,.5));
}
#canvas circle.node.gv-dragging-node {
  fill: var(--accent2) !important;
  cursor: grabbing;
  filter: drop-shadow(0 2px 12px rgba(201,90,0,.5));
}
#canvas g.node.gv-dragging-node circle {
  fill: var(--accent2) !important;
  cursor: grabbing;
  filter: drop-shadow(0 2px 12px rgba(201,90,0,.5));
}
#canvas circle.node.gv-selected {
  stroke: #2a1f0a !important;
  stroke-width: 3 !important;
  filter: drop-shadow(0 2px 14px rgba(232,114,12,.7));
}
#canvas g.node.gv-selected circle {
  stroke: #2a1f0a !important;
  stroke-width: 3 !important;
  filter: drop-shadow(0 2px 14px rgba(232,114,12,.7));
}

/* rect / group node */
#canvas g.node {
  cursor: grab;
}
#canvas g.node rect {
  fill: #e8720c !important;
  stroke: #c95a00 !important;
}
#canvas g.node text {
  fill: #ffffff !important;
}
#canvas g.node.gv-dragging-node {
  cursor: grabbing;
}
#canvas g.node rect {
  transition: stroke .15s, filter .15s, fill .15s;
}
#canvas g.node:hover rect {
  stroke: #2a1f0a !important;
  filter: drop-shadow(0 2px 10px rgba(232,114,12,.4));
}
#canvas g.node.gv-selected rect {
  stroke: #2a1f0a !important;
  stroke-width: 2.5 !important;
  filter: drop-shadow(0 2px 16px rgba(232,114,12,.6));
}
#canvas g.node.gv-dragging-node rect {
  stroke: #c95a00 !important;
  filter: drop-shadow(0 2px 12px rgba(201,90,0,.5));
}

#canvas line.link, #canvas line.edge,
#canvas path.link, #canvas path.edge,
#canvas .gv-link, #canvas .edge {
  stroke: #c0a070 !important;
  stroke-width: 1.5 !important;
  fill: none !important;
  pointer-events: stroke;
  cursor: help;
}

#canvas text {
  font-family: var(--font);
  pointer-events: none;
}

/* samo za standalone tekst van node grupa */
#canvas > svg > g > text {
  fill: var(--text);
  font-size: 11px;
  text-anchor: middle;
  dominant-baseline: central;
}

#tooltip {
  position: absolute;
  padding: 6px 11px;
  background: #fff8ee;
  border: 1px solid #d0a060;
  border-radius: var(--radius);
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  white-space: pre;
  z-index: 20;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .15s, transform .15s;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
#tooltip.gv-visible { opacity: 1; transform: translateY(0); }
</style>
